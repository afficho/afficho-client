<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Afficho</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%236C3AED'/%3E%3Cstop offset='100%25' stop-color='%232563EB'/%3E%3C/linearGradient%3E%3ClinearGradient id='sc' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0%25' stop-color='%231E1B4B'/%3E%3Cstop offset='100%25' stop-color='%230F172A'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='512' height='512' rx='96' fill='url(%23bg)'/%3E%3Crect x='72' y='80' width='368' height='264' rx='20' fill='%23fff' opacity='.15'/%3E%3Crect x='84' y='92' width='344' height='240' rx='12' fill='url(%23sc)'/%3E%3Crect x='112' y='136' width='180' height='16' rx='8' fill='%236C3AED' opacity='.9'/%3E%3Crect x='112' y='164' width='140' height='12' rx='6' fill='%23fff' opacity='.35'/%3E%3Crect x='112' y='186' width='160' height='12' rx='6' fill='%23fff' opacity='.25'/%3E%3Crect x='112' y='208' width='120' height='12' rx='6' fill='%23fff' opacity='.2'/%3E%3Crect x='320' y='136' width='80' height='84' rx='8' fill='%232563EB' opacity='.6'/%3E%3Ccircle cx='340' cy='156' r='8' fill='%23fff' opacity='.5'/%3E%3Cpolygon points='320,210 360,176 400,210' fill='%23fff' opacity='.3'/%3E%3Crect x='208' y='356' width='96' height='12' rx='6' fill='%23fff' opacity='.25'/%3E%3Crect x='240' y='344' width='32' height='20' rx='4' fill='%23fff' opacity='.2'/%3E%3Ccircle cx='380' cy='292' r='20' fill='%236C3AED' opacity='.9'/%3E%3Cpolygon points='374,282 374,302 392,292' fill='%23fff'/%3E%3Cpath d='M420 108a40 40 0 010 56' stroke='%23fff' stroke-width='5' stroke-linecap='round' fill='none' opacity='.35'/%3E%3Cpath d='M434 96a60 60 0 010 80' stroke='%23fff' stroke-width='5' stroke-linecap='round' fill='none' opacity='.25'/%3E%3C/svg%3E">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0F172A;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* ── Double-buffer stage ── */
    #stage {
      position: relative;
      width: 100%; height: 100%;
    }
    .layer {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      visibility: hidden;
      z-index: 0;
    }
    .layer.active {
      visibility: visible;
      z-index: 1;
    }
    .layer img {
      width: 100%; height: 100%;
      object-fit: contain;
    }
    .layer video {
      width: 100%; height: 100%;
      object-fit: contain;
    }
    .layer iframe {
      width: 100%; height: 100%;
      border: none;
    }

    /* ── Progress bar ── */
    #progress-bar {
      position: fixed;
      bottom: 0; left: 0;
      height: 3px;
      background: linear-gradient(90deg, #6C3AED, #2563EB);
      width: 0%;
      z-index: 500;
      display: none;
    }
    #progress-bar.active {
      display: block;
      animation: progress-fill var(--progress-duration, 10s) linear forwards;
    }
    @keyframes progress-fill {
      from { width: 0%; }
      to   { width: 100%; }
    }

    /* ── Splash / idle state ── */
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      position: relative;
    }
    #splash .logo {
      width: 96px;
      height: 96px;
      opacity: 0.9;
    }
    #splash .wordmark {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #6C3AED, #2563EB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #splash .message {
      font-size: 1rem;
      color: #475569;
      letter-spacing: 0.05em;
    }

    /* ── Avatar ── */
    .avatar {
      position: absolute;
      left: 100%;
      top: 50%;
      transform: translateY(-50%);
      margin-left: 1.5rem;
      width: 80px;
      height: auto;
      opacity: 0.35;
    }
    .avatar .arm-right {
      transform-origin: 64px 60px;
      will-change: transform;
      animation: checkWatch 8s ease-in-out infinite;
    }
    .avatar .head-group {
      transform-origin: 50px 32px;
      will-change: transform;
      animation: headTilt 8s ease-in-out infinite;
    }
    @keyframes checkWatch {
      0%, 72%  { transform: rotate(0deg); }
      78%, 88% { transform: rotate(-120deg); }
      94%, 100% { transform: rotate(0deg); }
    }
    @keyframes headTilt {
      0%, 74%  { transform: rotate(0deg); }
      80%, 86% { transform: rotate(12deg); }
      92%, 100% { transform: rotate(0deg); }
    }

    /* ── Alert overlay ── */
    #alert-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.92);
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }
    #alert-overlay.visible { display: flex; }
    #alert-overlay .alert-box {
      max-width: 80%;
      text-align: center;
      animation: alertIn 0.3s ease-out;
    }
    #alert-overlay .alert-icon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }
    #alert-overlay .alert-text {
      font-size: 2.4rem;
      font-weight: 700;
      color: #FFFFFF;
      line-height: 1.3;
    }
    @keyframes alertIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="stage">
    <div id="layer-a" class="layer active"></div>
    <div id="layer-b" class="layer"></div>
  </div>
  <div id="progress-bar"></div>
  <div id="alert-overlay">
    <div class="alert-box">
      <div class="alert-icon">&#9888;</div>
      <div class="alert-text"></div>
    </div>
  </div>

  <!-- Inline logo SVG used by the splash screen -->
  <template id="splash-tpl">
    <div id="splash">
      <svg class="logo" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6C3AED"/>
            <stop offset="100%" stop-color="#2563EB"/>
          </linearGradient>
          <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#1E1B4B"/>
            <stop offset="100%" stop-color="#0F172A"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="96" fill="url(#bg)"/>
        <rect x="72" y="80" width="368" height="264" rx="20" fill="#fff" opacity="0.15"/>
        <rect x="84" y="92" width="344" height="240" rx="12" fill="url(#screen)"/>
        <rect x="112" y="136" width="180" height="16" rx="8" fill="#6C3AED" opacity="0.9"/>
        <rect x="112" y="164" width="140" height="12" rx="6" fill="#fff" opacity="0.35"/>
        <rect x="112" y="186" width="160" height="12" rx="6" fill="#fff" opacity="0.25"/>
        <rect x="112" y="208" width="120" height="12" rx="6" fill="#fff" opacity="0.2"/>
        <rect x="320" y="136" width="80" height="84" rx="8" fill="#2563EB" opacity="0.6"/>
        <circle cx="340" cy="156" r="8" fill="#fff" opacity="0.5"/>
        <polygon points="320,210 360,176 400,210" fill="#fff" opacity="0.3"/>
        <rect x="208" y="356" width="96" height="12" rx="6" fill="#fff" opacity="0.25"/>
        <rect x="240" y="344" width="32" height="20" rx="4" fill="#fff" opacity="0.2"/>
        <circle cx="380" cy="292" r="20" fill="#6C3AED" opacity="0.9"/>
        <polygon points="374,282 374,302 392,292" fill="#fff"/>
        <path d="M420 108 a40 40 0 0 1 0 56" stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.35"/>
        <path d="M434 96 a60 60 0 0 1 0 80" stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25"/>
      </svg>
      <span class="wordmark">afficho</span>
      <span class="message"></span>
      <!-- Avatar that periodically checks its watch -->
      <svg class="avatar" viewBox="0 0 100 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g class="head-group">
          <circle cx="50" cy="32" r="22" fill="#334155"/>
          <circle cx="42" cy="28" r="2.5" fill="#94A3B8"/>
          <circle cx="58" cy="28" r="2.5" fill="#94A3B8"/>
          <path d="M42 38 Q50 44 58 38" stroke="#94A3B8" stroke-width="2" stroke-linecap="round" fill="none"/>
        </g>
        <rect x="36" y="54" width="28" height="44" rx="6" fill="#334155"/>
        <path d="M36 60 L22 90" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
        <g class="arm-right">
          <path d="M64 60 L78 90" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
          <rect x="73" y="84" width="10" height="7" rx="2" fill="#6C3AED"/>
          <rect x="76" y="86" width="4" height="3" rx="1" fill="#818CF8"/>
        </g>
        <path d="M44 96 L40 140" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
        <path d="M56 96 L60 140" stroke="#334155" stroke-width="8" stroke-linecap="round"/>
        <ellipse cx="38" cy="144" rx="10" ry="5" fill="#1E293B"/>
        <ellipse cx="62" cy="144" rx="10" ry="5" fill="#1E293B"/>
      </svg>
    </div>
  </template>

  <script>
    var layerA = document.getElementById('layer-a');
    var layerB = document.getElementById('layer-b');
    var progressBar = document.getElementById('progress-bar');
    var splashTpl = document.getElementById('splash-tpl');
    var alertOverlay = document.getElementById('alert-overlay');
    var alertText = alertOverlay.querySelector('.alert-text');

    var advanceTimer = null;
    var alertTimer = null;
    var swapTimeout = null;

    // Double-buffer state
    var activeLayer = 'a'; // 'a' or 'b'
    var currentItemID = null;

    // Display settings
    var showProgressBar = false;

    // ── Content rendering (double-buffered) ─────────────────────────────

    function createContentElement(item) {
      var el;
      switch (item.type) {
        case 'image':
          el = document.createElement('img');
          el.src = item.source;
          break;
        case 'video':
          el = document.createElement('video');
          el.src = item.source;
          el.autoplay = true;
          el.muted = true;
          el.loop = false;
          el.playsInline = true;
          el.addEventListener('ended', function() {
            fetch('/display/advance', { method: 'POST' });
          });
          break;
        case 'url':
          el = document.createElement('iframe');
          el.src = item.source;
          el.sandbox = 'allow-scripts allow-same-origin allow-forms'
            + (item.allow_popups ? ' allow-popups' : '');
          break;
        case 'html':
          el = document.createElement('iframe');
          el.src = '/content/' + item.id + '/render';
          el.sandbox = 'allow-scripts allow-same-origin allow-forms'
            + (item.allow_popups ? ' allow-popups' : '');
          break;
        default:
          return null;
      }
      return el;
    }

    function getLayer(id) {
      return id === 'a' ? layerA : layerB;
    }

    function renderToBackground(item) {
      var bgKey = activeLayer === 'a' ? 'b' : 'a';
      var bg = getLayer(bgKey);
      bg.innerHTML = '';

      var el = createContentElement(item);
      if (!el) {
        currentItemID = null;
        showSplash('Unknown content type: ' + item.type);
        return;
      }

      // Cancel any pending swap from a previous transition
      if (swapTimeout) { clearTimeout(swapTimeout); swapTimeout = null; }

      if (el.tagName === 'IFRAME' || el.tagName === 'IMG') {
        var swapped = false;
        var doSwap = function() {
          if (swapped) return;
          swapped = true;
          if (swapTimeout) { clearTimeout(swapTimeout); swapTimeout = null; }
          swapLayers();
        };
        el.addEventListener('load', doSwap, { once: true });
        // Timeout fallback — swap after 5s even if load doesn't fire
        bg.appendChild(el);
        swapTimeout = setTimeout(doSwap, 5000);
      } else {
        // Video — swap immediately so autoplay starts
        bg.appendChild(el);
        swapLayers();
      }
    }

    function swapLayers() {
      var fgKey = activeLayer;
      var bgKey = activeLayer === 'a' ? 'b' : 'a';
      getLayer(bgKey).classList.add('active');
      getLayer(fgKey).classList.remove('active');
      // Clear old layer after visual swap
      setTimeout(function() { getLayer(fgKey).innerHTML = ''; }, 100);
      activeLayer = bgKey;
    }

    function handleCurrent(payload) {
      if (!payload || !payload.type) {
        currentItemID = null;
        showSplash('No content scheduled');
        resetProgressBar(0);
        return;
      }

      // Same item — skip re-render, just reset the progress bar
      if (payload.id === currentItemID) {
        resetProgressBar(payload.duration_s);
        if (!wsConnected) {
          schedulePoll(payload.duration_s * 1000);
        }
        return;
      }

      currentItemID = payload.id;
      renderToBackground(payload);
      resetProgressBar(payload.duration_s);

      // When using polling fallback, schedule the next tick.
      if (!wsConnected) {
        schedulePoll(payload.duration_s * 1000);
      }
    }

    function showSplash(msg) {
      var clone = splashTpl.content.cloneNode(true);
      clone.querySelector('.message').textContent = msg || '';
      var fg = getLayer(activeLayer);
      fg.innerHTML = '';
      fg.appendChild(clone);
    }

    // ── Progress bar ────────────────────────────────────────────────────

    function resetProgressBar(durationS) {
      if (!showProgressBar || !durationS) {
        progressBar.classList.remove('active');
        return;
      }
      // Reset animation by removing class, forcing reflow, then re-adding
      progressBar.classList.remove('active');
      void progressBar.offsetWidth;
      progressBar.style.setProperty('--progress-duration', durationS + 's');
      progressBar.classList.add('active');
    }

    // ── Alert overlay ───────────────────────────────────────────────────

    function showAlert(payload) {
      alertText.textContent = payload.text || '';
      alertOverlay.classList.add('visible');
      if (alertTimer) clearTimeout(alertTimer);
      var ttl = (payload.ttl_s || 30) * 1000;
      alertTimer = setTimeout(hideAlert, ttl);
    }

    function hideAlert() {
      alertOverlay.classList.remove('visible');
      if (alertTimer) { clearTimeout(alertTimer); alertTimer = null; }
    }

    // ── Display settings ────────────────────────────────────────────────

    function applySettings(settings) {
      if (settings.show_progress_bar !== undefined) {
        showProgressBar = !!settings.show_progress_bar;
        if (!showProgressBar) {
          progressBar.classList.remove('active');
        }
      }
    }

    function fetchSettings() {
      fetch('/display/settings')
        .then(function(res) { return res.json(); })
        .then(function(data) { applySettings(data); })
        .catch(function() { /* use defaults */ });
    }

    // ── WebSocket connection ────────────────────────────────────────────

    var ws = null;
    var wsConnected = false;
    var wsRetries = 0;
    var WS_MAX_RETRIES = 10;

    function wsUrl() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      return proto + '//' + location.host + '/ws/display';
    }

    function connectWS() {
      try {
        ws = new WebSocket(wsUrl());
      } catch (e) {
        console.error('ws: constructor failed', e);
        scheduleReconnect();
        return;
      }

      ws.onopen = function() {
        console.log('ws: connected');
        wsConnected = true;
        wsRetries = 0;
        // Stop any polling fallback timer.
        if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }
      };

      ws.onmessage = function(event) {
        var msg;
        try { msg = JSON.parse(event.data); } catch (e) { return; }

        switch (msg.type) {
          case 'current':
            handleCurrent(msg.payload);
            break;
          case 'reload':
            location.reload();
            break;
          case 'alert':
            showAlert(msg.payload || {});
            break;
          case 'settings':
            applySettings(msg.payload || {});
            break;
        }
      };

      ws.onclose = function() {
        console.log('ws: disconnected');
        wsConnected = false;
        ws = null;
        scheduleReconnect();
      };

      ws.onerror = function() {
        // onclose fires after onerror, so reconnect is handled there.
        if (ws) ws.close();
      };
    }

    function scheduleReconnect() {
      wsRetries++;
      if (wsRetries > WS_MAX_RETRIES) {
        console.log('ws: max retries reached, falling back to polling');
        startPolling();
        return;
      }
      // Exponential backoff: 1s, 2s, 4s, 8s, ... capped at 30s.
      var delay = Math.min(1000 * Math.pow(2, wsRetries - 1), 30000);
      console.log('ws: reconnecting in ' + delay + 'ms (attempt ' + wsRetries + ')');
      setTimeout(connectWS, delay);
    }

    // ── Polling fallback ────────────────────────────────────────────────

    function schedulePoll(ms) {
      if (advanceTimer) clearTimeout(advanceTimer);
      advanceTimer = setTimeout(tick, ms);
    }

    function tick() {
      fetch('/display/current')
        .then(function(res) {
          if (res.status === 204) {
            showSplash('No content scheduled');
            resetProgressBar(0);
            schedulePoll(5000);
            return null;
          }
          return res.json();
        })
        .then(function(item) {
          if (!item) return;
          handleCurrent(item);
        })
        .catch(function(e) {
          console.error('poll error', e);
          showSplash('Waiting for connection\u2026');
          schedulePoll(5000);
        });
    }

    function startPolling() {
      console.log('falling back to polling /display/current');
      tick();
    }

    // ── Boot ────────────────────────────────────────────────────────────

    showSplash('Connecting\u2026');
    fetchSettings();
    connectWS();
  </script>
</body>
</html>
