<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- ── Icon ── -->
  <!-- Rounded square background -->
  <rect x="16" y="16" width="168" height="168" rx="32" fill="url(#bg)"/>

  <!-- Screen bezel -->
  <rect x="40" y="40" width="120" height="86" rx="8" fill="#fff" opacity="0.15"/>

  <!-- Screen interior -->
  <rect x="44" y="44" width="112" height="78" rx="6" fill="url(#screen)"/>

  <!-- Content bars on screen -->
  <rect x="56" y="58" width="56" height="6" rx="3" fill="#6C3AED" opacity="0.9"/>
  <rect x="56" y="68" width="42" height="4" rx="2" fill="#fff" opacity="0.35"/>
  <rect x="56" y="76" width="48" height="4" rx="2" fill="#fff" opacity="0.25"/>
  <rect x="56" y="84" width="36" height="4" rx="2" fill="#fff" opacity="0.2"/>

  <!-- Image placeholder -->
  <rect x="120" y="58" width="26" height="30" rx="3" fill="#2563EB" opacity="0.6"/>

  <!-- Stand -->
  <rect x="82" y="132" width="36" height="5" rx="2.5" fill="#fff" opacity="0.25"/>
  <rect x="92" y="126" width="16" height="9" rx="2" fill="#fff" opacity="0.2"/>

  <!-- Play indicator -->
  <circle cx="134" cy="106" r="8" fill="#6C3AED" opacity="0.9"/>
  <polygon points="132,102 132,110 138,106" fill="#fff"/>

  <!-- Broadcast waves -->
  <path d="M144 52 a14 14 0 0 1 0 18" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M150 47 a20 20 0 0 1 0 28" stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.25"/>

  <!-- ── Wordmark ── -->
  <text x="212" y="122" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="#1E1B4B" letter-spacing="-1">
    afficho
  </text>

  <!-- Tagline -->
  <text x="214" y="150" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#6C3AED" letter-spacing="3" opacity="0.8">
    DIGITAL SIGNAGE
  </text>
</svg>
