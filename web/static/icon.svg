<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Screen bezel -->
  <rect x="72" y="80" width="368" height="264" rx="20" fill="#fff" opacity="0.15"/>

  <!-- Screen interior -->
  <rect x="84" y="92" width="344" height="240" rx="12" fill="url(#screen)"/>

  <!-- Content bars on screen (signage content) -->
  <rect x="112" y="136" width="180" height="16" rx="8" fill="#6C3AED" opacity="0.9"/>
  <rect x="112" y="164" width="140" height="12" rx="6" fill="#fff" opacity="0.35"/>
  <rect x="112" y="186" width="160" height="12" rx="6" fill="#fff" opacity="0.25"/>
  <rect x="112" y="208" width="120" height="12" rx="6" fill="#fff" opacity="0.2"/>

  <!-- Image placeholder on screen -->
  <rect x="320" y="136" width="80" height="84" rx="8" fill="#2563EB" opacity="0.6"/>
  <circle cx="340" cy="156" r="8" fill="#fff" opacity="0.5"/>
  <polygon points="320,210 360,176 400,210" fill="#fff" opacity="0.3"/>

  <!-- Stand / base -->
  <rect x="208" y="356" width="96" height="12" rx="6" fill="#fff" opacity="0.25"/>
  <rect x="240" y="344" width="32" height="20" rx="4" fill="#fff" opacity="0.2"/>

  <!-- Play indicator (bottom-right of screen) -->
  <circle cx="380" cy="292" r="20" fill="#6C3AED" opacity="0.9"/>
  <polygon points="374,282 374,302 392,292" fill="#fff"/>

  <!-- Broadcast waves (top-right) -->
  <path d="M420 108 a40 40 0 0 1 0 56" stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.35"/>
  <path d="M434 96 a60 60 0 0 1 0 80" stroke="#fff" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.25"/>
</svg>
