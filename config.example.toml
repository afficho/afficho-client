# Afficho Client — Example Configuration
# Copy to config.toml and adjust for your environment.
# Any omitted keys use the built-in defaults.

[server]
# Address the HTTP server listens on.
# Use "0.0.0.0" to allow access from other devices on the network.
host = "0.0.0.0"
port = 8080

[admin]
# Password for the admin UI and API write endpoints (Community Edition).
# If empty, authentication is disabled — only do this on a trusted network.
# Enterprise Edition: SSO and RBAC are handled by the Afficho Cloud console.
password = "changeme"

[display]
# Set to true on production devices to automatically launch the browser.
# Keep false during development — open http://localhost:8080/display manually.
launch_browser = false

# Browser executable name or "auto" to try chromium-browser, chromium,
# google-chrome, brave-browser in order. Common values:
#   Raspberry Pi OS:  "chromium-browser"
#   Debian/Ubuntu:    "chromium"
#   Others:           "google-chrome"
browser = "auto"

# X11 or Wayland display to use (Linux only).
display_env = ":0"

# Display platform: "auto", "x11", or "wayland".
# "auto" detects Wayland via the WAYLAND_DISPLAY environment variable.
platform = "auto"

# Screen power schedule — turn HDMI off at night, on in the morning.
# Use HH:MM format. Leave empty to disable.
# screen_off_time = "22:00"
# screen_on_time  = "07:00"

[storage]
# Directory for the SQLite database and downloaded media files.
# Created automatically if it does not exist.
data_dir = "./data"

# Maximum disk space for cached media (gigabytes).
max_cache_gb = 10

# Maximum file size for a single upload (megabytes).
max_upload_mb = 100

[security]
# CORS: list of allowed origins for /api/v1 cross-origin requests.
# Empty (default) = same-origin only (no CORS headers sent).
# Uncomment and add origins if you access the API from a different domain.
# cors_allowed_origins = ["https://dashboard.example.com"]

# Maximum concurrent file uploads. Prevents disk exhaustion from
# parallel large uploads. Default: 2. Requires restart to change.
# upload_concurrency_limit = 2

[cloud]
# Afficho Cloud sync (not yet implemented).
enabled = false
endpoint = "https://api.afficho.io"
device_id = ""
token = ""

[logging]
# Set to true for verbose debug output.
debug = false
